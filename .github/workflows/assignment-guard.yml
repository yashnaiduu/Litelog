name: Assignment Guard

on:
  issue_comment:
    types: [created]

jobs:
  guard:
    name: Enforce Contribution Standard
    runs-on: ubuntu-latest
    permissions:
      issues: write

    # Only run on issue comments, not PR comments
    if: ${{ github.event.issue.pull_request == null }}

    steps:
      - name: Detect assignment requests without a proposal
        uses: actions/github-script@v7
        with:
          script: |
            const commenter = context.payload.comment.user.login;
            const owner = context.repo.owner;

            // Skip the repo owner
            if (commenter === owner) return;

            const body = context.payload.comment.body;

            // Detect bare "assign me" type comments
            const assignPatterns = [
              /assign\s*(me|this\s*to\s*me)/i,
              /can\s*i\s*(work|take|own|fix|do)\s*(on\s*)?this/i,
              /i\s*(want|would like)\s*to\s*(work|take|fix|do)\s*(on\s*)?this/i,
              /please\s*assign/i,
              /give\s*me\s*(this|access)/i,
            ];

            const isAssignRequest = assignPatterns.some(p => p.test(body));

            // A proposal must be substantive (>80 chars) and contain technical intent
            const hasProposal = body.length > 80 && (
              /approach|plan|implement|fix|refactor|change|solution|proposal|idea|suggest/i.test(body)
            );

            if (isAssignRequest && !hasProposal) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                body: `Hey @${commenter}, thanks for your interest! 🙌

Before being assigned, please share a **brief technical proposal** in a follow-up comment:

- What is the root cause or scope of this issue?
- What approach do you plan to take to fix or implement it?
- Are there any trade-offs or edge cases you've considered?

Once a maintainer reviews your approach and gives the go-ahead, we'll be happy to assign this to you. This keeps the work focused and avoids duplicated effort.`
              });
            }
