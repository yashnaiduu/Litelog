name: Issue Triage

on:
  issues:
    types: [opened]

jobs:
  triage:
    name: Welcome & Label New Issues
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Label as needs-triage
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: ['needs-triage']
            });

      - name: Welcome first-time contributor
        uses: actions/github-script@v7
        env:
          WELCOME_BODY: |
            Hey {creator}, thanks for opening your first issue on LiteLog!

            A maintainer will review this shortly. In the meantime, please ensure:

            - The issue title clearly describes the problem or request
            - All relevant sections of the template are filled in
            - You have checked existing issues to avoid duplicates

            If you would like to work on this yourself, please comment with your proposed approach first — describe what you plan to change and why. A maintainer will acknowledge it before you start. This keeps efforts aligned and avoids duplicate work.

            See CONTRIBUTING.md for full contribution guidelines.
        with:
          script: |
            const creator = context.payload.issue.user.login;

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              creator,
              state: 'all',
              per_page: 2
            });

            if (issues.data.length > 1) return;

            const body = process.env.WELCOME_BODY
              .replace('{creator}', `@${creator}`)
              + `\nhttps://github.com/${context.repo.owner}/${context.repo.repo}/blob/main/CONTRIBUTING.md`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body
            });
